<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dynamic Multi-Step Form Engine</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --primary: #3b82f6;
      --primary-2: #2563eb;
      --danger: #ef4444;
      --success: #10b981;
      --border: #334155;
      --input: #0b1220;
      --shadow: 0 10px 30px rgba(0,0,0,0.25);
      --radius: 14px;
      --transition: 220ms ease;
      --max-width: 860px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.15), transparent 30%),
        linear-gradient(180deg, #0b1020 0%, #0f172a 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100%;
    }

    body {
      padding: 32px 16px;
    }

    .app-shell {
      width: 100%;
      max-width: var(--max-width);
      margin: 0 auto;
    }

    .form-card {
      background: rgba(17, 24, 39, 0.92);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .form-header {
      padding: 24px 24px 16px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
    }

    .form-title {
      margin: 0 0 8px;
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .form-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.5;
    }

    .progress-wrap {
      padding: 20px 24px 0;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      font-size: 0.94rem;
      color: var(--muted);
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      background: rgba(148, 163, 184, 0.12);
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--primary), #60a5fa);
      border-radius: inherit;
      transition: width 300ms ease;
    }

    .step-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      list-style: none;
      padding: 16px 0 0;
      margin: 0;
    }

    .step-list li {
      padding: 10px 12px;
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 10px;
      color: var(--muted);
      background: rgba(255,255,255,0.02);
      transition: var(--transition);
      font-size: 0.92rem;
      text-align: center;
    }

    .step-list li.active {
      color: white;
      border-color: rgba(59,130,246,0.55);
      background: rgba(59,130,246,0.12);
    }

    .step-list li.complete {
      color: #d1fae5;
      border-color: rgba(16,185,129,0.45);
      background: rgba(16,185,129,0.10);
    }

    .form-body {
      padding: 24px;
      position: relative;
      min-height: 360px;
    }

    .step-panel {
      display: none;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 260ms ease, transform 260ms ease;
    }

    .step-panel.active {
      display: block;
    }

    .step-panel.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .step-title {
      margin: 0 0 8px;
      font-size: 1.3rem;
      font-weight: 650;
    }

    .step-description {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.5;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
    }

    .field-wrap {
      grid-column: span 12;
      opacity: 1;
      max-height: 300px;
      overflow: hidden;
      transform: translateY(0);
      transition:
        opacity 220ms ease,
        max-height 220ms ease,
        transform 220ms ease,
        margin 220ms ease,
        padding 220ms ease;
    }

    .field-wrap.col-6 {
      grid-column: span 6;
    }

    .field-wrap.hidden {
      opacity: 0;
      max-height: 0;
      transform: translateY(-6px);
      margin: 0;
      padding: 0;
      pointer-events: none;
    }

    .field-label {
      display: inline-block;
      margin-bottom: 8px;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .required-mark {
      color: var(--danger);
      margin-left: 4px;
    }

    .field-control,
    .field-select {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--input);
      color: var(--text);
      padding: 12px 14px;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
      font-size: 0.97rem;
    }

    .field-control:focus,
    .field-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(59,130,246,0.14);
    }

    .field-help {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.85rem;
      line-height: 1.45;
    }

    .field-error {
      margin-top: 6px;
      min-height: 18px;
      color: #fca5a5;
      font-size: 0.85rem;
    }

    .field-invalid .field-control,
    .field-invalid .field-select,
    .field-invalid .option-group {
      border-color: rgba(239,68,68,0.9);
      box-shadow: 0 0 0 4px rgba(239,68,68,0.12);
    }

    .option-group {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--input);
      padding: 10px 12px;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .option-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 2px;
      color: var(--text);
      cursor: pointer;
      user-select: none;
    }

    .option-item input {
      accent-color: var(--primary);
      transform: translateY(1px);
    }

    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 20px 24px 24px;
      border-top: 1px solid rgba(148, 163, 184, 0.12);
    }

    .nav-left,
    .nav-right {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    button {
      border: 0;
      border-radius: 10px;
      min-height: 44px;
      padding: 0 18px;
      font-size: 0.96rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 140ms ease, opacity 140ms ease, background 180ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.06);
      color: white;
      border: 1px solid rgba(148, 163, 184, 0.18);
    }

    .btn-primary {
      background: linear-gradient(180deg, var(--primary), var(--primary-2));
      color: white;
    }

    .btn-danger {
      background: rgba(239,68,68,0.12);
      color: #fecaca;
      border: 1px solid rgba(239,68,68,0.24);
    }

    .status-text {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .submit-message {
      margin-top: 20px;
      padding: 14px 16px;
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.24);
      color: #d1fae5;
      border-radius: 10px;
      display: none;
    }

    pre.debug-output {
      margin-top: 16px;
      background: #0b1220;
      border: 1px solid rgba(148,163,184,0.16);
      border-radius: 12px;
      padding: 14px;
      overflow: auto;
      color: #cbd5e1;
      font-size: 0.88rem;
      line-height: 1.5;
    }

    @media (max-width: 720px) {
      .field-wrap.col-6 {
        grid-column: span 12;
      }

      .form-body,
      .form-header,
      .nav-bar,
      .progress-wrap {
        padding-left: 16px;
        padding-right: 16px;
      }

      .nav-bar {
        flex-direction: column;
        align-items: stretch;
      }

      .nav-left,
      .nav-right {
        width: 100%;
        justify-content: space-between;
      }

      .nav-right button,
      .nav-left button {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div id="form-root"></div>
  </div>

  <script>
    const FORM_SCHEMA = {
      id: "contractor-onboarding-form",
      title: "Dynamic Multi-Step Form Engine",
      subtitle: "Generated entirely from JSON schema with conditional logic, validation, persistence, and animated multi-step navigation.",
      storageKey: "dynamic-form-engine-demo-v1",
      steps: [
        {
          id: "personal",
          title: "Personal Information",
          description: "Start with your basic profile details.",
          fields: [
            {
              type: "text",
              name: "fullName",
              label: "Full Name",
              placeholder: "Jane Doe",
              required: true,
              minLength: 3,
              maxLength: 60,
              col: 6
            },
            {
              type: "email",
              name: "email",
              label: "Email Address",
              placeholder: "jane@example.com",
              required: true,
              pattern: "^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$",
              col: 6
            },
            {
              type: "number",
              name: "age",
              label: "Age",
              placeholder: "30",
              required: true,
              pattern: "^(1[89]|[2-9]\\d)$",
              helpText: "Must be 18 or older for this demo.",
              col: 6
            },
            {
              type: "radio",
              name: "role",
              label: "Work Type",
              required: true,
              col: 6,
              options: [
                { label: "Employee", value: "employee" },
                { label: "Contractor", value: "contractor" },
                { label: "Vendor", value: "vendor" }
              ]
            }
          ]
        },
        {
          id: "work",
          title: "Work Details",
          description: "Fields in this step react to prior selections.",
          fields: [
            {
              type: "text",
              name: "company",
              label: "Company Name",
              placeholder: "Acme Inc.",
              required: true,
              minLength: 2,
              maxLength: 80,
              col: 6
            },
            {
              type: "select",
              name: "department",
              label: "Department",
              required: true,
              col: 6,
              options: [
                { label: "Select a department", value: "" },
                { label: "Engineering", value: "engineering" },
                { label: "Design", value: "design" },
                { label: "Marketing", value: "marketing" },
                { label: "Operations", value: "operations" }
              ]
            },
            {
              type: "text",
              name: "contractAgency",
              label: "Contract Agency",
              placeholder: "Northstar Staffing",
              col: 6,
              required: true,
              dependsOn: {
                field: "role",
                operator: "===",
                value: "contractor"
              }
            },
            {
              type: "number",
              name: "contractDuration",
              label: "Contract Duration (months)",
              placeholder: "12",
              col: 6,
              required: true,
              pattern: "^([1-9]|1[0-9]|2[0-4])$",
              dependsOn: {
                field: "role",
                operator: "===",
                value: "contractor"
              }
            },
            {
              type: "checkbox",
              name: "equipmentNeeded",
              label: "Need company equipment?",
              col: 12,
              dependsOn: {
                field: "role",
                operator: "!==",
                value: "vendor"
              }
            }
          ]
        },
        {
          id: "preferences",
          title: "Preferences",
          description: "Capture setup choices and preferences.",
          fields: [
            {
              type: "select",
              name: "workMode",
              label: "Preferred Work Mode",
              required: true,
              col: 6,
              options: [
                { label: "Select work mode", value: "" },
                { label: "On-site", value: "onsite" },
                { label: "Hybrid", value: "hybrid" },
                { label: "Remote", value: "remote" }
              ]
            },
            {
              type: "text",
              name: "city",
              label: "City",
              placeholder: "Berlin",
              required: true,
              minLength: 2,
              maxLength: 50,
              col: 6
            },
            {
              type: "text",
              name: "shippingAddress",
              label: "Shipping Address",
              placeholder: "221B Baker Street",
              required: true,
              minLength: 8,
              maxLength: 120,
              col: 12,
              dependsOn: {
                field: "equipmentNeeded",
                operator: "===",
                value: true
              }
            }
          ]
        },
        {
          id: "review",
          title: "Review & Submit",
          description: "Confirm the details below and submit.",
          fields: [
            {
              type: "checkbox",
              name: "agreeTerms",
              label: "I agree to the terms and conditions",
              required: true,
              col: 12
            }
          ]
        }
      ]
    };

    class FormEngine {
      constructor(schema, mountSelector) {
        this.schema = schema;
        this.mountEl = document.querySelector(mountSelector);
        this.currentStep = 0;
        this.formData = {};
        this.errors = {};
        this.fieldRefs = new Map();
        this.stepRefs = [];
        this.progressRefs = {};
        this.submitMessageEl = null;
        this.debugOutputEl = null;

        this.loadState();
        this.initializeFormData();
        this.render();
        this.attachGlobalEvents();
        this.evaluateAllDependencies();
        this.renderCurrentStep(true);
        this.updateProgressUI();
        this.updateDebugOutput();
      }

      initializeFormData() {
        this.schema.steps.forEach(step => {
          step.fields.forEach(field => {
            if (!(field.name in this.formData)) {
              if (field.type === "checkbox") {
                this.formData[field.name] = false;
              } else {
                this.formData[field.name] = "";
              }
            }
          });
        });
      }

      loadState() {
        try {
          const raw = localStorage.getItem(this.schema.storageKey);
          if (!raw) return;
          const parsed = JSON.parse(raw);
          if (parsed && typeof parsed === "object") {
            this.formData = parsed.formData || {};
            this.currentStep = Number.isInteger(parsed.currentStep) ? parsed.currentStep : 0;
          }
        } catch (error) {
          console.warn("Failed to load form state:", error);
        }
      }

      saveState() {
        try {
          localStorage.setItem(this.schema.storageKey, JSON.stringify({
            formData: this.formData,
            currentStep: this.currentStep
          }));
        } catch (error) {
          console.warn("Failed to save form state:", error);
        }
      }

      clearSavedState() {
        localStorage.removeItem(this.schema.storageKey);
      }

      render() {
        this.mountEl.innerHTML = `
          <div class="form-card">
            <div class="form-header">
              <h1 class="form-title">${this.escapeHtml(this.schema.title)}</h1>
              <p class="form-subtitle">${this.escapeHtml(this.schema.subtitle || "")}</p>
            </div>

            <div class="progress-wrap">
              <div class="progress-meta">
                <span id="progress-label">Step 1 of ${this.schema.steps.length}</span>
                <span id="progress-percent">25%</span>
              </div>
              <div class="progress-bar" aria-hidden="true">
                <div id="progress-fill" class="progress-fill"></div>
              </div>
              <ol id="step-list" class="step-list"></ol>
            </div>

            <div class="form-body">
              <div id="steps-container"></div>
              <div id="submit-message" class="submit-message"></div>
              <pre id="debug-output" class="debug-output" aria-label="Form data preview"></pre>
            </div>

            <div class="nav-bar">
              <div class="nav-left">
                <button type="button" id="reset-btn" class="btn-danger">Reset</button>
              </div>
              <div class="nav-right">
                <button type="button" id="back-btn" class="btn-secondary">Back</button>
                <button type="button" id="next-btn" class="btn-primary">Next</button>
              </div>
            </div>
          </div>
        `;

        this.progressRefs = {
          label: this.mountEl.querySelector("#progress-label"),
          percent: this.mountEl.querySelector("#progress-percent"),
          fill: this.mountEl.querySelector("#progress-fill"),
          stepList: this.mountEl.querySelector("#step-list"),
          stepsContainer: this.mountEl.querySelector("#steps-container"),
          backBtn: this.mountEl.querySelector("#back-btn"),
          nextBtn: this.mountEl.querySelector("#next-btn"),
          resetBtn: this.mountEl.querySelector("#reset-btn")
        };

        this.submitMessageEl = this.mountEl.querySelector("#submit-message");
        this.debugOutputEl = this.mountEl.querySelector("#debug-output");

        this.renderStepList();
        this.renderSteps();
      }

      renderStepList() {
        this.progressRefs.stepList.innerHTML = this.schema.steps
          .map((step, index) => `<li data-step-index="${index}">${this.escapeHtml(step.title)}</li>`)
          .join("");
      }

      renderSteps() {
        this.progressRefs.stepsContainer.innerHTML = "";
        this.stepRefs = [];

        this.schema.steps.forEach((step, stepIndex) => {
          const panel = document.createElement("section");
          panel.className = "step-panel";
          panel.dataset.stepIndex = stepIndex;

          const fieldsHtml = step.fields.map(field => this.renderField(field)).join("");

          panel.innerHTML = `
            <h2 class="step-title">${this.escapeHtml(step.title)}</h2>
            <p class="step-description">${this.escapeHtml(step.description || "")}</p>
            <div class="form-grid">
              ${fieldsHtml}
            </div>
          `;

          this.progressRefs.stepsContainer.appendChild(panel);
          this.stepRefs.push(panel);

          step.fields.forEach(field => {
            const wrapper = panel.querySelector(`[data-field-name="${field.name}"]`);
            const inputEls = wrapper.querySelectorAll(`[data-input-name="${field.name}"]`);
            const errorEl = wrapper.querySelector(".field-error");

            this.fieldRefs.set(field.name, {
              field,
              wrapper,
              inputs: Array.from(inputEls),
              errorEl,
              stepIndex
            });

            this.applyFieldValue(field.name);
            this.bindFieldEvents(field.name);
          });
        });
      }

      renderField(field) {
        const colClass = field.col === 6 ? "col-6" : "";
        const requiredMark = field.required ? `<span class="required-mark">*</span>` : "";
        const helpText = field.helpText ? `<div class="field-help">${this.escapeHtml(field.helpText)}</div>` : "";

        let controlHtml = "";

        switch (field.type) {
          case "text":
          case "email":
          case "number":
            controlHtml = `
              <input
                class="field-control"
                type="${field.type}"
                id="${field.name}"
                data-input-name="${field.name}"
                name="${field.name}"
                placeholder="${this.escapeHtml(field.placeholder || "")}"
                autocomplete="off"
              />
            `;
            break;

          case "select":
            controlHtml = `
              <select
                class="field-select"
                id="${field.name}"
                data-input-name="${field.name}"
                name="${field.name}"
              >
                ${field.options.map(option => `
                  <option value="${this.escapeHtml(String(option.value))}">
                    ${this.escapeHtml(option.label)}
                  </option>
                `).join("")}
              </select>
            `;
            break;

          case "radio":
            controlHtml = `
              <div class="option-group" role="radiogroup" aria-labelledby="label-${field.name}">
                ${field.options.map((option, idx) => `
                  <label class="option-item" for="${field.name}-${idx}">
                    <input
                      type="radio"
                      id="${field.name}-${idx}"
                      data-input-name="${field.name}"
                      name="${field.name}"
                      value="${this.escapeHtml(String(option.value))}"
                    />
                    <span>${this.escapeHtml(option.label)}</span>
                  </label>
                `).join("")}
              </div>
            `;
            break;

          case "checkbox":
            controlHtml = `
              <div class="option-group">
                <label class="option-item" for="${field.name}">
                  <input
                    type="checkbox"
                    id="${field.name}"
                    data-input-name="${field.name}"
                    name="${field.name}"
                  />
                  <span>${this.escapeHtml(field.label)}</span>
                </label>
              </div>
            `;
            break;

          default:
            controlHtml = `<div class="field-help">Unsupported field type: ${this.escapeHtml(field.type)}</div>`;
        }

        const labelHtml = field.type === "checkbox"
          ? ""
          : `<label id="label-${field.name}" class="field-label" for="${field.name}">${this.escapeHtml(field.label)}${requiredMark}</label>`;

        return `
          <div class="field-wrap ${colClass}" data-field-name="${field.name}">
            ${labelHtml}
            ${controlHtml}
            ${helpText}
            <div class="field-error" aria-live="polite"></div>
          </div>
        `;
      }

      bindFieldEvents(fieldName) {
        const ref = this.fieldRefs.get(fieldName);
        if (!ref) return;

        ref.inputs.forEach(input => {
          const eventName = input.type === "radio" || input.type === "checkbox" || input.tagName === "SELECT"
            ? "change"
            : "input";

          input.addEventListener(eventName, () => {
            this.syncFieldValue(fieldName);
            this.evaluateAllDependencies();
            this.saveState();
            this.updateDebugOutput();
          });

          input.addEventListener("blur", () => {
            this.validateField(fieldName);
            this.updateDebugOutput();
          });
        });
      }

      attachGlobalEvents() {
        this.progressRefs.backBtn.addEventListener("click", () => this.goToPreviousStep());
        this.progressRefs.nextBtn.addEventListener("click", () => this.goToNextStep());
        this.progressRefs.resetBtn.addEventListener("click", () => this.resetForm());
      }

      syncFieldValue(fieldName) {
        const ref = this.fieldRefs.get(fieldName);
        if (!ref) return;

        const { field, inputs } = ref;
        let value = "";

        switch (field.type) {
          case "checkbox":
            value = !!inputs[0]?.checked;
            break;
          case "radio":
            value = inputs.find(input => input.checked)?.value || "";
            break;
          case "number":
            value = inputs[0]?.value ?? "";
            break;
          default:
            value = inputs[0]?.value ?? "";
        }

        this.formData[fieldName] = value;
        this.validateField(fieldName, false);
      }

      applyFieldValue(fieldName) {
        const ref = this.fieldRefs.get(fieldName);
        if (!ref) return;

        const { field, inputs } = ref;
        const value = this.formData[fieldName];

        switch (field.type) {
          case "checkbox":
            if (inputs[0]) inputs[0].checked = !!value;
            break;
          case "radio":
            inputs.forEach(input => {
              input.checked = input.value === String(value);
            });
            break;
          default:
            if (inputs[0]) inputs[0].value = value ?? "";
        }
      }

      evaluateAllDependencies() {
        this.schema.steps.forEach(step => {
          step.fields.forEach(field => {
            const ref = this.fieldRefs.get(field.name);
            if (!ref) return;

            const visible = this.isFieldVisible(field);
            ref.wrapper.classList.toggle("hidden", !visible);

            if (!visible) {
              this.clearFieldValue(field.name);
              this.clearFieldError(field.name);
            }
          });
        });

        this.saveState();
        this.updateDebugOutput();
      }

      isFieldVisible(field) {
        if (!field.dependsOn) return true;

        const { field: depField, operator, value } = field.dependsOn;
        const currentValue = this.formData[depField];

        switch (operator) {
          case "===":
            return currentValue === value;
          case "!==":
            return currentValue !== value;
          case ">":
            return Number(currentValue) > Number(value);
          case "<":
            return Number(currentValue) < Number(value);
          case ">=":
            return Number(currentValue) >= Number(value);
          case "<=":
            return Number(currentValue) <= Number(value);
          case "includes":
            return Array.isArray(currentValue) ? currentValue.includes(value) : String(currentValue).includes(String(value));
          default:
            return false;
        }
      }

      clearFieldValue(fieldName) {
        const ref = this.fieldRefs.get(fieldName);
        if (!ref) return;

        const { field } = ref;
        const emptyValue = field.type === "checkbox" ? false : "";

        if (this.formData[fieldName] !== emptyValue) {
          this.formData[fieldName] = emptyValue;
          this.applyFieldValue(fieldName);
        }
      }

      validateField(fieldName, showMessage = true) {
        const ref = this.fieldRefs.get(fieldName);
        if (!ref) return true;

        const { field, wrapper, errorEl } = ref;

        if (!this.isFieldVisible(field)) {
          delete this.errors[fieldName];
          wrapper.classList.remove("field-invalid");
          errorEl.textContent = "";
          return true;
        }

        const value = this.formData[fieldName];
        const stringValue = value == null ? "" : String(value).trim();

        let error = "";

        if (field.required) {
          if (field.type === "checkbox" && value !== true) {
            error = "This field is required.";
          } else if (field.type !== "checkbox" && stringValue === "") {
            error = "This field is required.";
          }
        }

        if (!error && stringValue !== "") {
          if (field.minLength && stringValue.length < field.minLength) {
            error = `Minimum length is ${field.minLength} characters.`;
          } else if (field.maxLength && stringValue.length > field.maxLength) {
            error = `Maximum length is ${field.maxLength} characters.`;
          } else if (field.pattern) {
            try {
              const regex = new RegExp(field.pattern);
              if (!regex.test(stringValue)) {
                error = "Invalid format.";
              }
            } catch (e) {
              error = "Validation pattern is invalid.";
            }
          }
        }

        if (error) {
          this.errors[fieldName] = error;
          wrapper.classList.add("field-invalid");
          if (showMessage) errorEl.textContent = error;
          return false;
        }

        delete this.errors[fieldName];
        wrapper.classList.remove("field-invalid");
        errorEl.textContent = "";
        return true;
      }

      validateStep(stepIndex, showMessages = true) {
        const step = this.schema.steps[stepIndex];
        let isValid = true;

        step.fields.forEach(field => {
          const valid = this.validateField(field.name, showMessages);
          if (!valid) isValid = false;
        });

        return isValid;
      }

      goToNextStep() {
        this.submitMessageEl.style.display = "none";
        const valid = this.validateStep(this.currentStep, true);

        if (!valid) return;

        if (this.currentStep < this.schema.steps.length - 1) {
          this.currentStep += 1;
          this.renderCurrentStep();
          this.updateProgressUI();
          this.saveState();
        } else {
          this.submitForm();
        }
      }

      goToPreviousStep() {
        this.submitMessageEl.style.display = "none";
        if (this.currentStep === 0) return;

        this.currentStep -= 1;
        this.renderCurrentStep();
        this.updateProgressUI();
        this.saveState();
      }

      renderCurrentStep(initial = false) {
        this.stepRefs.forEach((panel, index) => {
          panel.classList.remove("active", "visible");

          if (index === this.currentStep) {
            panel.classList.add("active");
            if (initial) {
              requestAnimationFrame(() => panel.classList.add("visible"));
            } else {
              requestAnimationFrame(() => panel.classList.add("visible"));
            }
          }
        });

        this.progressRefs.backBtn.disabled = this.currentStep === 0;
        this.progressRefs.nextBtn.textContent =
          this.currentStep === this.schema.steps.length - 1 ? "Submit" : "Next";
      }

      updateProgressUI() {
        const total = this.schema.steps.length;
        const current = this.currentStep + 1;
        const percent = Math.round((current / total) * 100);

        this.progressRefs.label.textContent = `Step ${current} of ${total}`;
        this.progressRefs.percent.textContent = `${percent}%`;
        this.progressRefs.fill.style.width = `${percent}%`;

        Array.from(this.progressRefs.stepList.children).forEach((item, index) => {
          item.classList.toggle("active", index === this.currentStep);
          item.classList.toggle("complete", index < this.currentStep);
        });
      }

      submitForm() {
        const valid = this.validateStep(this.currentStep, true);
        if (!valid) return;

        const payload = this.getVisibleDataOnly();
        this.submitMessageEl.style.display = "block";
        this.submitMessageEl.textContent = "Form submitted successfully. Saved state has been cleared.";
        this.debugOutputEl.textContent = JSON.stringify(payload, null, 2);
        this.clearSavedState();

        console.log("Submitted payload:", payload);
      }

      getVisibleDataOnly() {
        const output = {};

        this.schema.steps.forEach(step => {
          step.fields.forEach(field => {
            if (this.isFieldVisible(field)) {
              output[field.name] = this.formData[field.name];
            }
          });
        });

        return output;
      }

      clearFieldError(fieldName) {
        const ref = this.fieldRefs.get(fieldName);
        if (!ref) return;

        delete this.errors[fieldName];
        ref.wrapper.classList.remove("field-invalid");
        ref.errorEl.textContent = "";
      }

      resetForm() {
        this.formData = {};
        this.errors = {};
        this.currentStep = 0;
        this.clearSavedState();
        this.initializeFormData();

        this.schema.steps.forEach(step => {
          step.fields.forEach(field => {
            this.applyFieldValue(field.name);
            this.clearFieldError(field.name);
          });
        });

        this.evaluateAllDependencies();
        this.renderCurrentStep();
        this.updateProgressUI();
        this.updateDebugOutput();
        this.submitMessageEl.style.display = "none";
      }

      updateDebugOutput() {
        this.debugOutputEl.textContent = JSON.stringify(this.getVisibleDataOnly(), null, 2);
      }

      escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }
    }

    new FormEngine(FORM_SCHEMA, "#form-root");
  </script>
</body>
</html>
